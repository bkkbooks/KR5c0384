body:
  text: 欽定四庫全書御製道徳經序朕聞道者先天地而為萬物宗生生化化莫得而名者也惟至人凝道於身故其徳為𤣥徳而其言為聖言老子道貫天人徳超品彚著書五千餘言明清浄無為之㫖然其切於身心明於倫物世固鮮能知之也嘗觀其告孔子曰為人子者無以有已為人臣者無以有已而仲尼答曾子之問禮毎曰吾聞諸老聃豈非以人能清浄無為則忠孝油然而生禮樂合同而化乎猶龍之歎良有以也自河上公而後註者甚衆或以為修煉或以為權謀斯皆以小智窺測聖人失其意矣開元洪武之註雖各有發明亦未彰全㫖朕以聖言𤣥逺末學多岐茍不折以理𠂻恐益滋譌誤用是愽叅衆説芟繁去支為一註理取其簡而明辭取其約而達未知於經意果有合否然老子之書原非虚無寂滅之説權謀術數之談是註也於日用常行之理治心治國之道或亦不相徑庭也爰序諸簡端以明大㫖云順治十有三年嵗次丙申仲春朔日序欽定四庫全書子部十四御定道徳經注道家𩔖提要臣等謹案道徳經二卷順治十三年大學士成克鞏恭纂仰邀欽定御製序文發明是書本非虚無寂滅權謀術數之學注中亦備論日用常行之理治心治國之道於是猶龍之㫖燦然明顯矣此經自河上丈人而下注釋著録者凡八十餘家積三百餘卷其間或為之解或為之疏或為之音或為之章句或為之譜或為之傳其人則名臣若羊祜蘇轍名儒若王弼王肅逸士若嚴遵孫登陶𢎞景戴逵皇甫謐道流若葛洪杜光庭輩多所闡述而梁武帝唐明皇宋徽宗明太祖亦各有注解見淺見深隨其識趣而於老耼本㫖未免在離合顯晦之間今注參取衆說簡要明暢真足以益心智閎治理非徒以究清浄無為之說而已也乾隆四十六年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
