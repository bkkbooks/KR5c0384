body:
  text: 欽定四庫全書御定道德經注上篇大學士成克鞏恭纂第一章道可道非常道上道字乃制行之道可道行之也常道乃真常不變之道也名可名非常名上名字乃立言之名可名言之也常名即常道之名無名天地之始無名者道也所以生天生地也有名萬物之母有名者道所生也所以化生萬物也故常無欲以觀其妙常無者法道之無也觀者察也妙者道之妙微也常有欲以觀其徼常有者法道之有也徼者道之邊際此兩者同出而異名兩者謂有無也同出於道而時異其名同謂之𤣥凡逺而無所至極者其色必𤣥故以𤣥字形容道之不可名𤣥之又𤣥衆妙之門𤣥已至矣𤣥之又𤣥則𤣥亦不足以名之矣故為衆妙之所從出凡天下之道可以制行者非真常之道也凡天下之名可以立言者非常道之名也故無名之道渾淪無體而天地於此始焉及其有名長養不窮而萬物於此生焉道之有無兼該如此故得道者內觀其心心無其心外觀其形形無其形是謂常無蓋欲以察道之微妙焉至於措之五常施之百行無物不有無時不然是謂常有蓋欲以察道之邊際焉正以有無兩者非判然二物也同出於自然之道而時異其名耳蓋世有以有為道者有以無為道者有以非有非無為道者有以亦有亦無為道者彼皆分别執著而不知有無渾融故有無渾融斯謂之𤣥然𤣥亦不足以盡之而且𤣥又𤣥是謂衆妙之所從出而天下之道莫有過之者矣第二章天下皆知美之為美斯惡已真美不可知也皆知美之為美即非美矣皆知善之為善斯不善已真善不可知也皆知善之為善即非善矣故有無相生天下之物生於有有生於無難易相成見以為難則易至見以為易則難又至長短相形有長而後見有短有短而後見有長髙下相傾下者以髙為望髙者又以下為歸聲音相和此唱而彼和之彼唱而此又和之前後相隨自以為前而有前乎我者則為後自以為後而有後乎我者則為前是以聖人處無為之事以常道處事而道由於無為行不言之教以常名行教而教出於不言萬物作焉而不辭作猶動也不辭謂不辭謝禁止也生而不有不有不自有以為德為而不恃不恃不自恃以有能功成而不居不居不自居以為自夫惟不居是以不去不去謂物不能去也老子五千言上可以通於妙下可以通於徼以之求道則道得以之治國則國治以之修身則身安其言常道於是三者此章言性情之事夫人之所謂美善皆生於情以適情為美未必真美以適情為善未必真善如此者何情使然也夫人之性大同而其情則異以殊異之情外感於物是以好惡相繆矣惡無主皆知美之為美而不知惡之名已從美生皆知善之為善而不知不善之名已從善起天下之物未有不無對者有無之相生難易相成長短之相形髙下之相傾音聲之和前後之相隨有其一未有無其二聖人知之將復其性必化其情是以體道自然為無為之事行不言之教美者固美惡者亦化而為美善者固善不善者亦化而為善是以用無棄物教無棄人萬物各遂其性若未嘗使之然者故萬物並作吾從而與之作作而不辭萬物並生吾從而與之生生而不有方其有為非我之為順物而已故為而不恃及其有功非我之功應物而已故功成而不居夫惟不居則萬物莫不仰之如天地而愛之如父母更無離去之者矣第三章不尚賢使民不爭尚賢則民恥於不若而至於爭不貴難得之貨使民不為盜貴難得之貨則民病於無有而至於盜不見可欲使心不亂可欲如尚賢貴貨之類凡爭盜皆起於見可欲是以聖人之治虛其心實其腹除去嗜好其心常虛則欲盡理還而腹實矣弱其志强其骨和柔收斂其志常弱則無欲自剛而骨强矣常使民無知無欲使夫知者不敢為也常使百姓黜聰明絶嗜欲縱有知識者亦不敢有所作為為無為則無不治夫為治而至於無為則天下無不治矣聖人見夫知美斯惡知善斯不善故不敢唘天下之知其於賢也非遺而不用也而不矜尚之以唘民相競之心則民返於自然而不爭矣其於貨也非棄而不收也而不貴重之以啓民貪竊之意則民安於素朴而不為盜矣夫烈士狥名貪夫狥財亂所由生也今不尚賢則不見名之可欲不貴貨則不見利之可欲而心不惑亂矣是以聖人之治使心常虛而腹自實蓋清净而道來集也使志常弱而骨自强蓋無欲而能自剛也夫民生有欲無知則已聖人惟不啓其無涯之知故不導其無窮之欲民皆返浮抱朴間有知識者亦不敢有所作為則天下皆歸於無為而無不治矣夫無為由於無欲無欲由於無知果何以致此於民哉亦曰聖人者固自謂未嘗有知也固未嘗見天下有可欲之事也第四章道沖而用之或不盈道本無名故沖然為衆妙之門故用之不窮而莫能盈其量淵兮似萬物之宗淵至深之處也道為萬物母故曰宗挫其鋭心出而入物為鋭故當挫之解其紛物入而搆心為紛故當解之和其光本體之明和之而不曜同其塵民庶之雜同之而不殊湛兮似或存湛然至清如有所存吾不知其誰之子象帝之先吾不知道之所從生也其似在帝之先乎帝謂生物之主也夫無為之道夲至虛耳然以之適衆有雖天地之大民物之廣無所不遍愈用而愈不窮物有滿而道未嘗滿物自道而道嘗物淵乎似萬物之宗也人莫不有道惟聖人能全之何以全之挫其鋭恐其入於妄也解其紛恐其與物搆也不入於妄不與物搆則以汚染去而光生焉然茍自曜其光則是有心以立異於衆矣故和其光以至潔之光應至雜之塵而無所不用豈棄萬物而為道哉道如是而後全則湛然至清而嘗存矣雖存而人莫之識故曰似或存道雖存終莫得而名故曰不知其誰之子然又不可為無也故曰此其似帝之先乎帝者生物之主羣化皆處其後者也而道又先於帝則莫或先之者矣第五章天地不仁以萬物為芻狗聖人不仁以百姓為芻狗芻狗者結草為狗用之祭祀祭畢則棄之乃最無容心之物也天地之間其猶橐籥乎橐籥者鑄冶所用之風之器也橐者外之櫝所以受籥也籥者內之管所以鼓橐也虛而不屈動而愈出惟其空虛而無屈竭之時是以動蕩而有引伸之妙多言數窮不如守中中者不偏不倚之謂即道也夫道冥於帝之先而不知所從出故聖人為無為而無不治功成而不居又豈容存一心曰我能仁百姓哉天地體此道者也其生物也以不生生之聖人體此道者也其治天下也以不治治之何也萬物與天地同體百姓與聖人同體天地聖人內不見有能仁之心外不見有所仁之物其自視猶芻狗然則其視萬物百姓也亦若是而已矣惟不自以為仁故其仁無窮然則天地之間其猶橐籥乎惟其虛而不屈是以動而愈出者也則體此道者為無為而言亦無言可知已夫發於聲而為言而出此言者不可言也人莫不然然而往往尚口乃窮者以其心不倚於有則倚於無不著於取則著於捨不能與道相符故也夫惟不倚有無不著取捨而與道相符是謂之守中故多言數窮不如守中之為不窮也第六章谷神不死是謂𤣥牝谷喻言也以其虛而能受受而不有微妙莫測故曰谷神道本真常不滅故曰不死牝能生物猶所謂母也謂之𤣥者見其生而不見其所以生也𤣥牝之門是謂天地根言天地自此而生也綿綿若存用之不勤綿綿微而不絶也若存存而不可見也能如是雖終日用之而不勞矣人知天地之生萬物不知天地乃生於道也吾何以見道之神哉譬之於谷谷至虛而猶有形谷神則虛而無形也虛而無形尚無有生安有死耶不死則不生不生者能生生是謂之𤣥牝𤣥牝者有無之合牝能生者也道之所以生天地由此而已故曰是之謂天地根而為亡則綿綿而來嘗絶以為存耶則惡覩其存哉人能如是則有形之身可使虛而如谷無形之心可使寂而若神而吾之用之無所用心吻合而已尚何勤之有哉此章乃修養工夫之所自出老子之初意却不敷主修養也第七章天長地久天地所以能長且久者以其不自生故能長生不自生者惟生物而不自愛其生也是以聖人後其身而身先外其身而身存後其身者後已而先人也外其身者薄已而厚人也身先謂人莫之能上身存謂物莫之能害非以其無私耶故能成其私私謂身也後身身先外身身存故曰成其私上言道生天地此章言天地之生萬物聖人之成百姓也長生久夀莫如天地天地所以能長且久者正以天施地生其施物不已其生物不測未嘗一日愛其施未嘗一日怠其生是之謂不自生萬物莫不恃之以生故能長生聖人亦然知此心常真不變浩然與天地量故於此身無可愛者一心之運知無不為舉措之間無非善利由其不見有身故天下之有身者莫我若也故大德必得其祿必得其位必得其名必得其夀是謂後其身而身先外其身而身存蓋聖人之心明通公溥洞然無私非求以成其私也而私反以之成道則固然耳第八章上善若水水善利萬物而不爭處衆人之所惡故幾於道不爭不爭處髙潔也衆人之所惡謂卑下也幾於道似有道者之善也居善地避髙趨下未嘗有所逆善地也心善淵空虛靜默深不可窮善淵也與善仁利澤萬物施而不求報善仁也言善信圓必旋方必折塞必止决必流善信也政善治洗滌羣平凖髙下善治也事善能遇物賦形而不留於一善能也動善時冬凝春泮涸溢不失節善時也夫惟不爭故無尤水兼上文七者之善而不爭處髙潔故無怨尤之者聖人既已後其身外其身則又烏見有可爭之善哉夫一隂一陽之謂道之者善也上善者道之所謂善非天下皆知善之為善者也故若水焉蓋水灌溉浣濯有利萬物之功乃處衆人所惡汚下之地故幾於有道者之善也夫水兼七善之善而不爭而聖人似之是以居之安而居亦善地也定而靜而心亦善淵也仁覆天下與亦善仁也庸言之謹言亦善信也以政治國政亦善治也泛應曲當事亦善能也與時偕行動亦善時也夫人之有善而不免於人非者以其爭也聖人備衆善而不自以為能故於天下無所爭而天下亦無怨尤之者矣第九章持而行之不如其已揣而鋭之不可長保盈則必溢恐其溢而左右以枝之曰持鋭則必折懼其折而節量以治之曰揣金玉滿堂莫之能守戒之在貪也富貴而驕自遺其咎戒之在傲也功成名遂身退天之道功成名遂嘗存謙退之心是謂天之道此章言守身之道知盈之必溢而以持固之不若不盈之安也知鋭之必折而以揣先之不如不鋭之可長保也是故滿而不溢所以長守富也持而盈之則金玉滿堂莫之能守矣髙而不危所以長守貴也揣而鋭之則富貴而驕自遺其咎矣然則惟功名成就而常存謙退之心此所以無私而成其私也其得天之道乎第十章載營魄抱一能無離乎載乘也營魄即魂魄也抱一者相合而為一也専氣致柔能嬰兒乎嬰兒無所知而其氣至専無所能而其氣至柔滌除𤣥覽能無疵乎𤣥覽者𤣥妙之見也著之則不免瑕疵故當滌除之愛民治國能無為乎以愛愛民愛必不周以事治國國必不治清净無為則民自化矣天門開闔能為雌乎天門謂心也出入而無見其形是謂天門開闔以心之運動變化而言謂雌者守靜養動之意明白四達能無知乎內外明白中心洞然而不存知識故曰能無知生之畜之生而不有為而不恃長而不宰是謂𤣥德不宰者不自以為能宰制也雖有大德而物莫之能故曰𤣥德魂者人之陽魄者人之隂故魄為物魂為神也聖人性定而神凝不為物遷神常有以載乎魄衆人以物役性神昏而不治耳目困於聲色鼻口勞於臭味則魄當有以載乎神矣故教之以抱神載魄使兩者不相離此固聖人修身之安而長生久視其道亦由此也神不治則氣亂而强者好鬬弱者喜畏不自知也神治則氣専氣而不分致柔而無忤非嬰兒其孰能矣之聖人外不為魄所載內不為氣所使則超然𤣥覽茍此見未忘遣有著有耽無著無可勝病乎於是并其𤣥妙之見而亦滌除之庶不為見所病矣若此者茍誤認之不幾以虛無寂滅為學乎不知所言載營魄者非拱默之謂也即愛民治國而能無為也所謂為無為也専氣致柔者非鬱閉之謂也即天門開闔而能為雌也所謂雄守雌也滌除𤣥覽者非晦昧之謂也即明白四逹而能無知也蓋如鏡之於物來而應之非有意于索照也所謂知無知也夫聖人之道既足以生畜萬物而又不有不恃不宰茍非𤣥德深逺其孰能與於此第十一章三十輻共一轂當其無有車之用輻輪之股也轂車中之容軸者也當其無謂轂之空處轂惟空虛乃可行車故曰有車之用挻值以為器當其無有器之用挻和也埴土也和土為器器中空虛可以容物鑿戶以為室當其無有室之用鑿穿也户以出入牖以通明室惟空虛故人得居處故有之以為利有此車有此器有此室則有所以為天下利無之以為用車之轉軸器之容物室之出入通明皆當其無處則無者所以為天下用此章言有無合一之妙世人但知有之為用而不知以無運有其用乃神觀乎乘載以車而必轂有空虛之處乃得車之用日用以器而必器有空虛之處乃得器之用居處以室而必室有空虛之處乃得室之用三者皆當其無有其用而天下之理可以類推矣故非有則無無以施其利非無則有無以致其用可見有無原自合一知兩者之不可分斯知道之至也第十二章五色令人自盲盲言惑於視也五音令人耳聾聾謂惑於聽也五味令人口爽爽謂失正味也馳騁田獵令人心發狂發狂謂心神不定也難得之貨令人行妨難得之貨謂非日用常行之物行妨妨害德行也是以聖人為腹不為目腹者內也受而不取納而不留目者外也貪而不能受愈見而愈不足故去彼取此彼者目也此者腹也此章言聖人守身之㫖至人性定於中目辨色耳審音口和味田獵以時珍貨在御隨境而中不惑蓋得其正也若中無所主則為物遷遂使五色足以盲目五音足以聾耳五味足以爽口田獵足以亂心難得之貨足以傷行種種皆失其正外泪而真漓矣聖人惟守內不務外使其心承受諸物而不隨觸遷流故為腹而不為目既去彼以取此則中常淵靜而湛然不擾矣第十三章寵辱若驚寵榮貴也辱卑賤也若驚不安之貌寵辱若驚者言驚寵如驚辱也貴大患若身貴畏也言畏其身若畏大患也何謂寵辱若驚寵為上辱為下人知以辱為下而不知辱生於寵則辱非下而寵為下矣得之若驚失之若驚是謂寵辱若驚知寵為下則得之若不安而失之之時亦若得之之時無所損矣何謂貴大患若身吾所以有大患者為吾有身大患者身生疾病攻之于內寵辱得失攖之於外皆因有此身方有此患及吾無身吾有何患無身謂忘其身也知身之非實而忘之則大患盡去故貴以身為天下者可以寄天下貴自重其身也不䡖以身為天下天下反可寄於吾身愛以身為天下者可以託天下愛自惜其身也惜以身為天下天下反可託於吾身夫聖人既不以外而戕內則其守內也驚寵如驚辱畏身如畏大患何以言之寵辱原非兩物寵為辱先故下之而得亦驚失亦若驚則未嘗安寵而驚辱矣有身乃大患之本能忘其身而吉凶皆不得攖之則身且若無而患自不生矣推而言之貴以身為天下而天下可寄愛以身為天下而天下可託則知不有其身然後可以涉世而無纍也第十四章視之不見名曰夷夷平也聽之不聞名曰希希無也摶之不得名曰微摶執也微細也此三者不可致詰故混而為一一者道也三者之名雖立而究竟不可分别故仍混而為道其上不皎其下不昧皎明也昧暗也凡物皆上明下暗而道則在上不明在下不暗繩繩兮不可名復歸於無物繩繩運行不絶之貌運行而不可名則歸於無而已是謂無狀之狀無象之象是謂惚恍惚恍者若有若無出入變化之意迎之不見其首無始也隨之不見其後無終也執古之道以御今之有能知古始古之道自無而出執其初之無以御今之有則能知古始之所謂道矣是謂道紀紀紀綱也治道之綱也此章形容道之無跡道者無聲無臭先天地生於何而可見可聞可摶乎惟因其不可見而名之曰夷希因其不可聞而名之曰希因其摶之不可得而名之為曰微然欲舉三者而問之雖智者不能名狀則混而一仍見道無可分而已是道也仰觀於上而不見其明俯觀於下而不見其暗繩繩不絶以運行之及執名以求則復歸於無既歸於無而又若有無狀之狀無象之象則謂有不可謂無不可而以惚恍名之至矣哉道之盈天地而不可執著也以為來而迎之無前以為去而隨之無後此所謂道無在而無乎不在乎夫無前無後則不古不今矣然而追於物之所自生豈非古乎觀於物之所現在豈非今乎得道者惟執古以御今則知古之所始而無窮之道紀在是矣第十五章古之善為士者微妙𤣥通深不可識夫惟不可識故强為之容不可識則不可形容而勉强形容之豫若冬涉川戒而後動曰豫猶若畏四鄰疑而不行曰猶儼若客言其不敢慢渙若氷將釋言其恐欲陷敦兮其若朴言其質曠兮其若谷言其虛渾兮其若濁言其不與物異以上為也孰能濁以澄靜之徐清孰能安以久動之徐生徐者聽其自然之理保此道者不欲盈常虛而受則無盈溢夫惟不盈故能敝不新成敝故也不新能不新也成能成也此章言得道者之以虛為用也謂古之善為士者將以成聖而盡神也其入道之功由微至妙至極而𤣥𤣥則通通則深不可識矣至於不可識則又何從而形容之哉以為如不得已則若冬涉川以為如恐人見則若畏四鄰以為莊敬而若客以為恐懼而若履氷以為若朴之未雕以為若谷之能受以為渾然若濁而不與物異此七者疑之而不能擬之也意者其清乎世俗之士為濁所淆孰能如今之濁也而靜之而徐清意者其能生乎枯橋之人以定滅性孰能如今之安也而動之而徐生凡以保此道者其中原虛而不盈則但見故而不新能故而不新則千載如一日而道於是乎大成耳第十六章致虗極致者推其至也致虛而至於極則凡有皆藏於無矣守靜篤篤固也守靜而至於篤則凡動皆涵於靜矣萬物並作吾以觀其復作動也復者復其始也萬物有作必有復虛極靜也以觀其作且觀其復夫物藝藝各歸其根藝藝作之狀也歸其根如華葉之生於根復歸於根也歸根曰靜求靜者止動息念强持之而非靜也歸根則返於自然乃真靜矣靜曰復命人生而靜天之性也豈非賦命之本然乎靜而見性斯復命矣復命曰常湛然常存即所謂常道知常曰明物無障蔽故能生明不知常妄作凶不知常道而妄有作為凶機也知常容知常則人我之分善惡之見俱化矣豈非容物之量容乃公能容則為至公公乃王公則可以王天下王乃天王者與天同符天乃道至於天則皆道所充塞矣道乃久真常不變豈非能久沒身不殆沒身終身殆危也保道而不欲盈則貴致虛矣虛則必靜致處既極守靜既篤則萬物皆在觀照之中而於其作也觀其復焉正以物之生也雖藝藝之多而其終也各歸於本來之地故謂之歸根既歸根矣是則動極而靜之時至靜之中本然之理於此始復故曰復命至於復命乃是常久而不易者能知常久不易之道方謂之明矣夫人惟不知此常久不易之道故有妄想妄動皆失道而履凶也知常則其心與天地同大何物不容既能容矣則何事不公王天下者即此公道是也以公道而王則與天地同天即道也故曰天乃道此道也即所謂常久不易之道也能得此常久人之道則終其身無非道矣又何危殆之有哉第十七章太上不知有之太上猶言最上不知有之者謂相忘無言不知所以然也其次親之譽之道德既仁義乃彰義則民親其仁譽其其次畏之仁義不行政形斯作則民畏其戚其次侮之刑法不足以制其心則從事權術而民侮之矣信不足有不信惟上不自信而屢更治術則民始不信其上猶兮其貴言猶遲疑也言聖人自信有餘而猶然貴重其言不出諸口而民自信之功成事遂百姓皆謂我自然民安其身功成矣道既大同事遂矣此章言世降之弊而知道貴自然也大道之世相忘無未嘗治之民不知其所以然及其後也民之於居始有親譽之意又其後也始有畏懼之意又有後也始有玩侮之意凡此世道愈降而愈下者由於上之人誠信不足而民始有不信之者耳聖人則不然以道御天下亦既誠信有餘矣而其于言也然猶貴之不輕出諸口蓋不言無為俾民隂受其賜也及其功既成事既遂民日遷善而不知為之者誰皆謂我自然如此所謂帝力於我何有豈非盛治哉第十八章大道廢有仁義大道之隆無仁義之名而仁義行其中大道廢缺仁義乃名智慧出有大僞智以知之慧以察之以知察相加其僞愈出六親不和有孝慈六親父子兄弟夫婦也自六親不和而後有孝子慈父之名國家昏亂有忠臣君臣同父同德無忠臣之名也國亂而後忠臣見矣此章専言末流之逺於道道𨼆於無形安得有仁義之名哉以其有所受有所别而仁義乃彰大道於是廢矣道廢而智慧用智慧既用則人人出其變詐以相遁相髙而大僞於是日生矣夫至治之世不獨親其親不獨子其子六親未有不和者自人各親其親人各子其子而孝慈之名出故有孝慈者由於六親不和也大道為公主臣一德何從而有忠臣之名故有忠臣者由於國家昏亂也此見每降而愈下去道日逺之意第十九章絶聖棄智民利百倍非聖智不足以知道然使民知聖智之名必至馳騁意識以為害矣絶仁棄義民復孝慈仁義本在大道之中然使民竊仁義之名以行其私必有不孝不慈者矣絶巧棄利盜賊無有巧以便事利以濟物二者非以為盜而盜賊無巧利不行也此三者以為文不足故令有所屬屬附屬也下文朴素即所屬也聖智仁義巧利三者由世道日趨於文故有此名文不足以治天下故當使之有所附屬見素抱朴少私寡欲素未受采朴未斫器見素抱朴則心自無私欲自寡矣有道者觀乎世之遞降而去道日逺也曰此名之為病也故聖智之名出而後天下之害生不若棄之絶之而天下自利仁義之名出而後有孝不孝慈不慈分别之論不若棄而絶之與道相忘則人歸於孝慈之中而無所分别巧利之名作而後盜賊起不若棄而絶之而使民無所恃以為盜凡此三者皆其曰趨於丈故有此名耳自知道者觀之是文也不足以治天下不若使民有所屬故屬之以見素抱朴少私寡欲而天下自無事矣豈非上古之治哉第二十章絶學無憂學至於無所學乃為絶學無思無為故能無憂唯之與阿相去幾阿善之與惡相去何若唯阿皆應聲唯恭而阿慢善勝惡猶唯勝阿相去不逺人之所畏不可不畏荒兮其未央哉人之所畏聖人亦畏之而其所畏者大而無極荒兮未央言無畛域也衆人熙熙如享太牢如登春臺熙熙溺於所好也享太牢喻其美登春臺喻其樂我獨泊兮其未兆如嬰兒之未孩泊靜也兆萌芽也嬰方生也孩稍長也乘乘兮若無所歸駕車者既歸則不乘矣乘乘則似進似退未有歸著也衆人皆有餘而我獨若遺我愚人之心也哉遺忘也各矜所知則自謂有餘聖人無所不知而實無所知則若忘矣愚人之心言無所知也沌沌兮渾然無知衆人昭昭我獨若昏衆人察察我獨悶悶昭昭矜智巧也若昏自晦也察察苛細也悶悶無為也忽兮若晦若無所見也寂兮似無所止若無所棲也衆人皆有以我獨頑似鄙有以有所用之也頑鄙則無所用我獨異於人而貴食母道者萬物之母聖人以道為宗如嬰兒之食於母至人於聖智仁義巧利既棄絶之而歸於素朴其於世也又何所學乎惟無所學乃為絶學而物無足憂之矣夫世人所以擾擾多憂者以心之不能忘也而善惡之見為最故謂善之勝惡者猶之謂唯之勝阿而不知其相去俱無幾不若併善之名無之而此心廓然無纍矣然聖人非安意肆志以行之行人之所畏吾亦畏之而且無所不畏荒乎其未央焉正以衆人之於世味如享太平之美如登春臺之樂而聖人不然其靜也安守淡泊無一念之萌如嬰兒未孩之時其動也乘乘然若動若不動無所歸止而不著迹此其所以異於衆人也夫人惟自見其長則若有餘而聖人則包舉萬物而實空洞無物則超然若遺矣將謂是愚人之心也歟何其渾淪無知也故人見明而聖人獨若昏人能察物而聖人獨無為人皆各出其見若有所用而聖人獨頑然鄙然一無所施凡此所以異於人者蓋脫遺學問以道為宗如嬰兒之食於母而已夫嬰兒食母曽何憂乎第二十一章孔德之容唯道是從道無形容一可形容即屬之德然大德之容亦皆從出於道道之為物惟惚惟惚惚兮恍兮其中有象恍兮惚兮其中有物恍惚者若有若無之意有象有物則所謂無狀之狀無物之象也窈兮冥兮其中有精其精甚真其中有信窈冥深逺不可見之意精者得道之一而不雜者也蓋有中之有有之粗者也唯無中之有然後為有中之精唯其真故不以有而存不以無而亡是為有信自古及今其名不去以閲衆甫其名不去謂道不變也衆甫者萬有之始也自門出者一一而數之曰閲言道如門萬物皆自此往也吾何以知衆甫之然哉以此欲知萬物之所以然者惟始於此道而已夫遺物去智至於若頑若鄙則其容之甚德者也夫何所從出哉唯道之從而已道之為物惟恍而若有唯惚而若無者也方惚而恍恍則不昧不昧則疑於有物也乃其中有象象者疑於有物而非物也方恍而惚惚則不皎不皎則疑於無物也乃其中有物物者疑於無物而有物者也然非徒揣之以有物而已乃其中有精精者得道之一而不雜者也天下之物真而不僞信而不忒常而不變未有加於此是以古今雖異而道則不去唯末嘗去故能閲羣有之始而為萬物之母矣聖人所以能觀羣有之始而知羣有之所由然者以其體乎此道耳第二十二章曲則全聖人動必循理理之所在雖曲亦通也故與物不忤而能全枉則直循理雖枉天下之至直也窪則盈衆之所歸者下也故必盈敝則新昭昭察察非道也悶悶若將敝矣而實則之所自出也少則得多則惑道一而已得一則無所不得多學而無以一之則惑矣是以聖人抱一為天下式一者道也抱一者常與道俱也不自見故明因天下之所見而見之而我不自見也則所之無不察不自是故彰因天下之所是而是之而我不自是也則所是莫之能蓋不自伐故有功歸天下以功而我不自有也故有功不自矜故長任萬物以能而我不自矜也故長夫唯不爭故天下莫能與之爭聖人得一則無我無我則不爭古之所謂曲則全者豈虛語哉誠全而歸之夫所謂全者內以全身外以全物物我兼全而復歸于性其全也大矣能知衆甫之然則能抱一能抱一則能曲能枉能窪能敝矣物不可以終曲故曲則全物不可以終枉故枉則直窪則必盈敝則必新少則必得多則易惑此自然之理也古之聖人所以䏻為萬物宗者以其抱一也抱一者常與道俱故不自見而因人之見不自是而因物之是不自有其功而因人之功不自矜其長而因人之長唯不與物爭故天下莫能與之爭夫聖人循理而動本至全也而又能曲以養之則其全之也大矣第二十三章希言自然天地之理本自自然故自然二字其言不多而天地之理不過如此而已飄風不終朝驟雨不終曰孰為此者天地天地尚不能久而况於人乎自旦及晡為終朝自早及暮為終日飄風驟雨非出於常然故不能久故從事於道者道者同於道德者同於德失者同於失道行也德得也唯從事於道者為能無我故可行則行我無違焉可得則得我亦無違焉可失則失我亦無違焉同者隨順而無違之意同於道者道亦樂得之同於德者德亦樂得之同於失者失亦樂得之可行我亦樂得之可行我亦樂得之可失我亦樂得之行止行失我皆樂之此所以為知道之士信不足有不信然入道貴能信若信處有不足又則於此有不能自信者聖人之所以不爭者蓋以天地之理本自然而已故自然之道其言不多而天地之理盡於此世罕信之者喜於作也有作必有輟惡能久乎即飄風驟雨之不能久亦可見也從事於道者不然從事於道則自然矣自然則本無可得亦復何失無得無失而隨世之得失故得喪窮逹皆信其自至而無容心焉無不同亦無不樂也不知道者信道不篤因其失而疑之於是益以不信夫惟信道者然後可以語自疑之道也第二十四章跂者不立跨者不行舉踵曰跂張足曰跨立欲增髙則反害其立行欲增濶則反害其行自見者不明自是者不彰自伐者無功自矜者不長其在道曰餘食贅行物或惡之故有道者不處贅疣贅也行當作形食餘人必惡之形贅人必醜之夫聖人從事於自然而不自見不自是不自伐不自矜者蓋亦覩夫爭者之害也夫人未有不能立且行者也茍以立為足而加之以跂以行為未足而加之以跨未有不喪失其行立者彼其自見自是自伐自矜者亦若是矣其為道也為餘食贅行而已夫俗人皆嗜之而吾復取焉是餘食也性本無是而時侈之是贅行也餘食贅行物或惡之故宜有道者之不處也第二十五章有物混成先天地生妙理常存故曰有物萬道不能分故曰混成道生天地故曰先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道寂無聲也寥無形也廓然無偶曰獨立古今常一曰不改無所不在曰周行所在皆通曰不殆可以為天下母者天下萬物之所由生也不知其名不可得而名也强為之名曰大大曰逝逝曰逺逺曰反道之為物用之則彌滿六合卷之則莫知其所大豈足以名之哉强為之名而已大則往而無窮故大曰逝逝則逺而不禦故逝曰逺而而復歸其根則未始離乎吾身也故逺曰反故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然自天地區分而域中有四大王者居一焉王道人道之盡者也人法地者地之所至人亦至焉地法天者天之所至地亦至焉天法道者道之所至天亦至焉道則以無法為法者也無法者自然而已故曰道法自然此章言道之大而王者能配之也夫道非清非濁非髙非下渾然而成體其於人為性故曰有物混成此未有知其生者蓋湛然常存而天地生於其中耳寂兮無聲寥兮無形獨立無匹而未嘗變行於羣有而未嘗殆俯以化育萬物則皆其母矣道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故强為之名曰大謂之大矣然往而莫窮故曰逝謂之逝矣然無所不周故曰逺謂之逺矣然其一念之間無所不具故曰反蓋道之大如此是以域中有四大而王者兼法之法地如地之無私載法天如天之無私覆法道如道之無私生成而已是以喜怒哀樂之中節即足以位天地育萬物則王之配道又何難哉第二十六章重為輕根靜為躁君根本也躁者動之甚而煩擾也重則能使輕靜則能使躁故曰重為輕根靜為躁君是以聖人終日行不離輜重雖有榮觀燕處超然古者吉行師行皆有輜車在後所以載行者之衣食器械以其纍重故稱輜重榮觀紛華之觀也燕處猶燕居超然髙出而無繫著也奈何萬乘之主而以身輕天下輕則失根躁則失君以身䡖天下者謂以身勞天下之細故也䡖則自失其本矣躁則自失所主矣此章言治天下之道䡖者先感重者後應應者感之所自生則重為䡖之根矣靜者役物躁者役於物躁常為靜之所役則靜為躁之君矣是以聖人終日之間其行為可以約齎矣然猶不離輜重則輕之不可以無重也雖有榮觀為足以適矣而必有超然之燕處則躁之不可以無靜也况乎萬乘之主其可不靜且重乎蓋迫而後動不得已而後起則重矣無為焉則靜矣否則以細故自嬰一物亦足以役之又何以宰制天下第二十七章善行無轍迹循理而行故無迹善言無瑕謫時然後言故言滿天下無口過善計不用籌策萬物之數畢陳於前不計而知安用籌策善閉無關楗而不可開善結無繩約而不可解楗拒門木也橫曰關竪曰楗結繫也全德之人其於萬物如母之於子雖縱而不去故無關而能閉無繩而能約是以聖人常善救人故無棄人常善救物故無棄物是謂襲明聖人以真常之善救人人人皆在教育之中故無棄人以真常之善救物物物皆在化育之內故無棄物襲明言聖人藏其明而不露也故善人不善人之師不善人善人之資不貴其師不愛其資雖知大迷是為要妙善人不善人之師言不善人之可以為善人也不善人善人之資言不善人之有助乎善人也然聖人無心於物善人雖可為師而吾不知其師之為可貴也不善人雖可為資而吾不知其資之為可愛也聖人之妙雖知者亦有所不能喻故曰要妙此章言聖人之行雖靜且重其實無能名也善行善言善計善閉善結皆常善也唯常善則不以人而多不以物而少然人與物雖有常而失其真常故聖人每以真常救之以真常救人則無棄人以真常救物則無棄物蓋人與物同具此明唯聖人以知常之明而救之於所同然之際耳故其明藏而不可見是謂襲明是以善人不善人之師不善人善人之資人之不善何棄之有哉然聖人忘已忘物不知其師之為貴不知其資之為可愛則善惡兩忘混然而化於道雖智者亦有所不能喻豈非反本還原獨觀道妙者歟第二十八章知其雄守其雌為天下溪為天下溪常德不離復歸於嬰兒雄剛强也雌柔弱也知有運用之意守有主宰之意溪水所歸也常德即常道也人之初生常德內全及為物所遷則日離故常德不離則復歸於嬰兒知其白守其黑為天下式為天下式常德不忒復歸於無極白明顯也黑晦昧也式天下以為法也不忒無差夫也歸於無極則嬰兒又不足言矣知其榮守其辱為天下谷為天下谷常德乃足復歸於朴榮尊尚也辱卑下也谷亦水所歸也常德乃足又非特不忒而已朴者真之全而物之混成者也朴散則為器聖人用之則為官長故大制不割檏既斫而後有器聖人抱檏故用此檏以為官長火制者無所制也割分裂也此章言聖人以無御有同𤣥之道蓋天下之事有非柔所能獨濟者有非晦所能獨理者有非在下所能獨成者此聖人所以必知其雄知其白知其榮也然剛不生於剛而生於柔明不生於明而生於晦髙不生於髙而生於下此聖人所以必守其雌守其黑守其辱也聖人守此所以為溪為谷為式而天下歸之者正以此真常之德未之離焉耳嬰兒也無極也檏也實人固有之道故以復歸言之惟檏散則為器夫道形而上者也器形而下者也聖人以形而上者用形而下者則以此檏為官長焉蓋制物必割而無所制之大制則不割也其所謂抱朴而民自正者歟第二十九章將欲取天下而為之吾見其不得已聖人之有天下非取之也萬物歸之耳其始天下非為之也因萬物之自然耳若欲取而為之則不可得已天下神器不可為也為者敗之執者失之為之則傷自然故敗執之則乘通變故失故物或行或隨或詬或吹或强或羸或載或隳天下之物各有自然之性或行而先或隨而後或詬而溫或吹而寒或强而剛或羸而弱或載而動或隳而止其相反而不齊如此是以聖人去甚去奢去泰去甚慈也去奢儉也去泰不敢為天下先也聖人抱檏以治天下故大制不割則其取天下以無事治天下以無為而已夫何為哉若取而為之以求有得斯不可得矣蓋天下神器唯神道可以御之神者無思也無為也而為之則御之非其道故不可也為者所以求成而適足以敗之執者所以求得而適足以失之誠以凡物各有自然之性故有先後溫寒之不同剛弱動止之或異因其勢而道之者易簡而理自得也違其性而為之者煩勞而物愈擾也是以聖人去其甚去其奢去其泰使不至於過而傷物而天下無患者矣第三十章以道佐人主者不以兵强天下其事好還師之所處荆棘生焉大兵之後必有凶年好還謂還以兵相報也兵之所在民事廢故田不修用兵之後殺氣勝故年穀傷善者果而已不敢以取强善用兵者果决而已蓋主於克敵出於不得已非所恃以取强也果而勿矜果而勿伐果而勿驕果而不得已是果而勿强不矜其能不伐其功不驕其勢其果常出於不得已是乃果而勿强之道也物壯則老是謂不道不道早已物牡則老物之情也而道也者貴於守柔以為强故不道之事當已而勿為也人主者無為者也故以道佐人主者亦不以兵强天下蓋以道服天下則天下莫敢不服以兵强天下亦將阻而抗我矣况天時地利未必無所害乎是以善用兵者克敵而已非所恃以取强也然雖主于克敵而且勿矜勿伐勿驕焉其心誠出於不得已而非取强者矣蓋道也者貴於守柔以為强乃所以久而不殆也如棄柔而用壯壯則必老豈可常之道哉故當早已之而不以兵强天下也第三十一章夫佳兵者不祥之器物或惡之故有道者勿處佳兵善用兵也不處者以之濟難而不以為常君子居則貴左用兵則貴右左為陽陽主發生右隂隂主主肅殺兵者不祥之器非君子之器不得已而用之恬淡為上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下矣恬淡安靜也不美不善也吉事尚左凶事尚右偏將軍處左上將軍處右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之偏將之之職在上將軍之下偏將軍居左上將軍居右以勢言之下反居上矣正以兵為凶事故以喪禮處之喪禮尚隂也此章言用兵乃王者之不得已也謂喜用者者乃不祥之器而物或惡之故有道之人不以為常也夫平居貴左而用兵貴右正以兵為不祥非君子之所樂用必不得已而用之其惟恬淡乎恬淡則靜靜者勝之本也然君子雖勝而不以為喜勝之而喜是樂殺人之人矣樂殺人之人豈能得志於天下哉故吉事尚左凶事尚右而行兵之際偏將軍處左上將軍處右所以然者以喪禮處之也故殺人多則悲哀而泣之是戰雖勝而終以喪禮處之矣以見兵者不得已而用之非喜之也第三十二章道常無名道常即首章之常道無名即首章之無名朴雖小天下不敢臣無名之朴擬之若小侯王若能守萬物將自賔守守此朴也賓服也天地相合以降甘露人莫之令而自均令命令也均遍也始制有名名亦既有始制謂朴散為器有器則有名夫亦將知止止者不狥其名還鎮以朴知止所以不殆譬道之在天下猶川谷之於江海川谷水之分江海水之合此章言道器之循環也道無可名擬之以朴可謂小矣而天地以此而始萬物以此而生天下孰敢有臣之者乎為侯王者若能守此道則萬物自賔服之其服之也知天地之氣相合為一而降甘露侯王體至道以御物其不令而自均亦若露然孰得見其形哉至於萬物既作是朴散為器而有其名矣聖人不狥名以忘朴故與之以止止者復於道也所以乘萬變而不危殆也譬若川谷分派而必以江海為宗則渾器於道而仍鎮之以無名之朴耳第三十三章知人者智心能分别自知者明心無障蔽勝人者有力角力於外自勝者强克已之私知足者富所遇而足則常有餘强行者有志不與物爭自强不息不失其所者久存其所存不為物遷死而不亡者夀真性湛然則死而不亡此章言聖人之道返照內觀取諸已而皆足也蓋分别之心未除則知人而不能自知若夫知常之明自知了然矣相角之力雖勝然勝人而不能自勝若夫克已之强非力所及矣貪慕者日見不足我無不足之見則富矣逐物者物得相加我惟躬行不怠則志不可奪矣夫物變無窮而心未嘗失不失則久死生大故而性未嘗亡不亡則夀至於能久能夀豈非不生不死者乎至人所為萬物皆也第三十四章大道泛兮其可左右言無繫著也愛養萬物恃之以生而不辭功成而不名有愛養萬物而不為主不為主無主宰之心也常無欲可名於小湛然常虛則似乎小萬物歸焉而不知主可名於大無物不容則似乎大是以聖人終不為大故能成其大此章言道體之無方故若泛兮無著可以左可以右無所不周也既無不周是物物皆道之所生何嘗辭之既生矣又未嘗居之以為功蓋道者愛養萬物而原無主宰之心也惟其虛而無屬故無欲而可以名小而萬物歸之以為主道亦不自知則又可以名大然而大小實非定名而惟其能小所以能大故聖人終不自以為大乃能成其大也第三十五章執大象天下往大象者無象之象即道也往者歸之也往而不害安平泰往而不害者於物無傷也樂與餌過客止樂可悅耳餌可適口道之出口淡乎其無味視之不足見聽之不足聞用之不可既夫萬物恃道以生故聖人執此道而天下自然歸之歸之而莫受其傷則聖人皆安其平泰矣夫張樂設餌以待過客客過則止孰若道之出言也淡乎為無味之味而其不可見不可聞者正足彌亘今古用之而無盡哉以見恬淡無為乃成大象也第三十六章將欲歙之必固張之歙收斂也張開大也將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明微明謂雖若幽𨼆而實明白柔勝剛弱勝强魚不可脫於淵邦之利器不可以示人此章言盛衰往復之理而得聖人制心之妙將欲云者將然之辭必固云者已然之辭於其張已知其歙於其强已知其弱於其興已知其廢於其與已知其奪如日之中昃月之盈虧必然之理雖微甚明也故見形者以為剛强能制柔弱論理者則悟柔弱之勝剛强夫人之不能離於柔弱也猶魚之不能脫於淵也魚藏深渺之中柔弱自得而可以生活躍而在陸必無幸矣聖人退處巽順而能力旋天地豈出其利器以使人見哉蓋剛强之為害甚於兵刃故以利器喻之第三十七章道常無為而無不為侯王若能守萬物將自化化而欲作吾將鎮之以無名之朴作動也鎮者壓定之使不動也無名之朴亦將不欲不欲以靜天下將自正此章言道以無為體無不為為用而統之以兼忘也無為而無不為則為而無為之之意矣侯王若能守此無為之道則不求化萬物而萬物自化萬物之化始於無為而漸至於作必將紛紜多故矣聖人知之則於其方作而以無名之朴鎮之然而茍有用朴之心將使朴非其朴也故并朴而不欲則靜之至矣夫天下之不靜皆起於欲不欲而靜自然無為天下有不同歸於正者歟御定道德經注上篇
