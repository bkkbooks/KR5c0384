body:
  text: 欽定四庫全書御定道德經注下篇第三十八章上德不德是以有德下德不失德是以無德不德者相忘而化也不失德者執而未化也上德無為而無以為下德為之而有以為以者有心也無以為是無心而為之有以為則為容心矣上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之莫之應强民而民不從也扔引也攘臂而仍之言掣拽以引之形容强之之意㫖故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也前識者道之華而愚之始也前識者用智也華者浮忘也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此厚與實務內也薄與華務外也去彼取此謂不為禮義之類而為道也老子於此章首言上德非離道言德也無乎不在之謂道自其所得之謂德上德者得道之德也下德者失道而後德之德也上德者不思不勉而道自足故曰有德下德者勉强以求僅不失耳而何德之有故曰無德上德者不失道道常無為而無為之之心下德者不失德德則有為而有為之之跡至于仁義皆不免于為之其所以異者仁以無為為勝義以有為為功也若禮則其所以為之者最詳為之而不應則至於攘臂而强之强之而去道日逺矣故自道五降而至于禮禮者將以講忠信而止亂也及夫强之而不應則刑罰干戈種種而有故禮反為忠信之薄而亂之首猶之智以導愚多智則惑亂本真浮妄無實反為道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華妄仁去義絶禮遺智而志于道之大全是之謂去彼取此第三十九章昔之得一者一者道也天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞其致一也致極也言極其致無不同也天無以清將恐裂破毁也地無以寧將恐發動而不定也神無以靈將恐歇消也谷無以盈將恐竭盡也萬物無以生將恐滅枯橋也侯王無以貞而貴髙將恐蹶仆也故貴以賤為本未有貴乃貴之所自立髙以下為基未有髙而髙之所自起是以侯王自稱孤寡不榖此其以賤為本邪非乎孤寡不榖以賤自稱也故致數車無車致至也輿者總名若隨件而數之則為輪為輻為榖為軾遂無車矣不欲碌碌如玉落落如石碌碌燦然也落落塊然也此章言得道之妙道一而已天之所以清明地之所以安靜神之所以不測谷之所以能受萬物之所以生育王侯之所以保正萬邦極其致皆同出于此茍不得此則種種變遷而天將毁裂地將震動神將消歇谷將盡竭萬物將枯橋王侯將不得有其髙貴矣夫為王侯者欲常有其髙貴則非得道不可而道果何在乎視之不見執之無端亦天下之至微矣惟其至微即其至顯猶之貴以賤為本髙以下為基也不見王侯乎其稱孤稱寡稱不榖者非自居于賤邪而貴之本在此矣推其至如數車然于車之所冇者物物而數之以為是車且無車矣道之不可名亦若是耳豈能碌碌如玉落落如石可以指稱之而貴賤之也第四十章反者道之動反者復也復歸于靜也弱者道之用天下之物生于有有生于無上言貴以賤為本髙以下為基此復舉動靜强弱而又推言有無之始也復性則靜矣然感而遂通天下之故則動之所起也道無形無聲天下之至弱而運動乎天地則强莫加也故曰反者道之動弱者道之用有天地然後有萬物故曰物生于有然天地之始生于太虛是謂有生于無有無相生統歸之道則首章有名無名之說也第四十一章上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道勤而行者聞而必信也若存若亡者且信且疑也故建言有之建言者古人所立之言也以下數句是也明道若昧進道若退夷道若類類同也和光同塵之意上德若谷大白若辱辱汚也廣德若不足建德若偷偷茍且也質真若渝渝變改也大方無隅大方者太虛也隅東西南北之類大器晚成大音希聲大象無形道𨼆無名夫唯道善貸且成應人之乏而終以見還曰貸此章言世人信道之難因述古人論道之語上士知微知彰故聞道則勤行之中士在微彰之際故聞道而疑信相半若存若亡而已下士知彰而不知微故聞道則直笑之惟最下之人以之為笑方見吾道之髙故不笑不足以為道也古之立言者不有云乎明道若昧無所不照而非察也進道若退若止不行而速者莫或先之也夷道若類和之以是非而無物我之别也上德若谷常處卑下而受而不盈也大白若辱若居溷濁而終不可涅也衣天下而不冇其仁斯廣德若不足也生育萬物如無意然斯建德若偷也質真者不徇乎外外不徇則惟吾所之故反若變改也渾然太空不立圭角故大方無隅也以若拙之匠陶鑄天下自不為近功故大器晚成也以不言之教鼓動萬物自不事小說故大音希聲也事無事莫覩其用故大象無形為無為莫識其體故道𨼆無名夫惟善濟貸于萬物而不責其報是以萬物受其生成而不知其德故曰夫惟道善貸且成第四十二章道生一一生二二生三三生萬物方其為道則一亦未生及其有一即有二矣如有陽即有隂有隂陽則又有隂陽之交豈非三乎至于三則無所不有矣萬物負隂而抱陽凡物皆背止于後隂靜也物目口鼻居前陽動也冲氣以為和冲氣之虛行乎隂陽之間人之所惡惟孤寡不榖而王公以為稱此亦譬喻有道者自卑賤之意故物或損之而益或益之而損滿招損謙受益也人之所教我亦教之强梁者不得其死吾將以為教父木絶水曰梁木負棟亦曰梁取其力之强也故曰强梁母主養父主教故言生則曰母言教則曰父此言言道以虛為用而深戒滿盈也道在無物之始而世之自一而三以至于萬皆生于道則萬物之多莫不有道存焉觀其負隂抱陽而必有冲虛之氣以和之可見不虛則不生也古之制名者以卑下為王公之稱亦貴虛之意耳故物損之而反益益之而反損體此意也則愈知能虛能無之妙矣蓋古人嘗以此為教而我亦教之觀乎强梁者不得其死吾蓋將以此言為教父也第四十三章天下之至柔馳騁天下之至堅馳騁役使也無有入于無間無有無形無間無縫隙也吾是以知無為之有益不言之教無為之益天下希及之學道者知强梁之足戒則天下之道莫妙于用柔矣故堅者易折柔者常存以至柔而行于至堅如水之穿石則知柔之莫可靡也執有入有捍不相受以至無而入于至有如氣之周身則如無之莫可禦也以此而觀無為而無不為者至理也則不言而教自行無為而功自成天下孰能有及者者乎第四十四章名與身孰親身與貨孰多多猶重也得與亡孰病是故甚愛必大費有所愛則凡可以求之者無所不為能無費乎多藏必厚亡藏之多則攻之者必衆能無亡乎知足不辱知足者樂今冇之已多知止不殆知止者懼後加之有損可以長久此章言學道則自反而足勿務外求也狥名與貨多至傷身亦知身之親于名重于貨乎得名得貨而亡其所存則得與亡孰病乎是以甚愛者必大費多藏者必厚亡而惟知足則無求無求則無辱知止則不不進不進則不危以是守身長久之要道也第四十五章大成若缺其用必敝事成則敗之者至若缺者不自謂成也大盈若冲其用不窮器盈則損之者至若冲者不自見盈也大直若屈循理而行委曲皆直大巧若拙付物自然雖拙而巧大辨若訥訥者若不出口也因理而言雖訥而辨躁勝寒躁則氣盛故能勝寒靜勝熱靜則氣斂故能勝熱清靜為天下正清勝濁靜勝動以清靜理之天下自安此言常虛靜之妙有成則有缺大成者常若缺則其不用敝矣有盈則有虛大盈者常若虛則其用不窮矣大直者常若曲曲則全也大巧者常若拙不自矜也大辨者常若不能言以理應之無多言也今夫寒暑天地之氣有人于此一躁焉則可以勝寒一靜焉則可以勝熱一時之躁一時之靜非人身之正也而猶然有所勝然則清靜之可以正天下不待言矣而又何疑于成缺盈虛之數乎第四十六章天下有道却走馬以糞却屏去也糞糞田也天下無道戎馬生於郊戎馬戰馬也郊四野也罪莫大于可欲心見可欲非理而求禍莫大于不知足不知足則求而不已必害于人咎莫大于欲得欲而必得其心愈熾故知足之足常足矣一性之內無缺無餘人能安之無往不足此章深言欲之害道而戒以知足也天下有道民安于耕雖有善走之馬以之駕糞田之車耳天下無道則戰爭之事起戎馬生于四郊而民無安業矣原其所以戰爭者皆自欲心始之故罪英大于可欲由可欲則不知足故禍莫大于不知足由不知足則欲必得怨咎因之故咎莫大于欲得故不知足者雖足而不足則知足之足常足也可知矣第四十七章不出户知天下言安居而知天下之情不窺牖見天道言不必仰觀而可以見運行之理其出彌逺其知彌少天地不可以形盡足之所至見其形耳雖逺豈能盡乎是以聖人不行而知𡨕合于道則逺之而無不知不見而名其心既通則隨舉而得其名不為而成道至此而無所作為自成功矣此章言性體之足天下雖大人情物理而已雖不出户亦可知之天道雖𨼆隂陽變化而已雖不窺牖亦可見之若必出而求知則足跡所及所知能幾故曰其出彌逺其知彌少聖人不行而本乎道不見而本乎心故天下之事皆可得而知天道之妙皆可得而名能知能名故不為而成聼其自然而已第四十八章為學日益將以求益其知也為道日損將以求去其妄也損之又損以至于無為妄去真全則至無為而無不為矣無為則靜靜者羣動所由出也故取天下者常以無事取天下者天與民歸得之若故又何事也及其有事不足以取天下若有取之心則有取之事而非天下歸之矣此章言大道不在有為也為學所以求知故日求自益為道所以去妄故日求自損若損之又損而至于無為則恭已以治而任萬物之生成乃其所以無不為矣取天下者唯受天下之歸故常以無事及其有事則紛擾愈多義何足以取天下乎第四十九章聖人無常心心無所主也以百姓心為心善者吾善之不善者吾亦善之德善矣同德之善而非一人之善信者吾信之不信者吾亦信之德信矣同德之信而非一人之信聖人在天下惵惵為天下渾其心惵惵不自安而不已之意渾無圭角也百姓皆注其耳目聖人皆孩之此章言聖人忘心之妙無常心而以百姓之心為心譬之鑑然鑑中無形以所應之形為形而已故善者吾善之不善者吾亦善之善不善在彼吾之所以善之善同也可謂德善矣信者吾信之不信者吾亦信之信不信在彼吾之所以信之者同也可謂德信矣正以聖人惵惵然為百姓渾其心使善信者不其以自異而不善不信者不以自棄故也彼百姓者方注其耳目以觀聼聖人之好惡而聖人一以嬰兒遇之自以在彼不矜在此不愠釋然皆忘而天下定矣第五十章出生入死出者超然而脫離入者迷昧而汨沒生之徒十有三死之徒十有三人之生動之死地者亦十有三以十分言之生居其三死居其三動之死地者居其三所存之一則不生不死之道也夫何故以其生生之厚生死之徒所以不免生死者由忘有其生而矜生過厚耳蓋聞善攝生者攝生即養生陸行不遇兕虎兕野牛也入軍不避甲兵兕無所投其角虎無所措其瓜兵無所容其刃夫何故以其無死地此章言養生之道惟無生死出則為生入則為死用物取精以自滋養則為生之徒聲色臭味以自戕賊則為死之徒既知生死之分而作而不休以歸于盡則為動之死地者故舉天地生人之數而言之則十分之內生居其三死居其三動而之死者居其三凡此有生則必有死者正以其矜生之過厚耳是生固死之地矣故善養生者內不見有身外不見有物孰為虎兕孰為甲兵而惟見角無所投瓜無所措刃無所容何也無地以容之之也故曰以其無死地第五十一章道生之虛無窈冥物之所以生也德畜之太和氤氲物所以畜也物形之聚而成物形可見也勢成之自生而長自長而成自然之勢也是以萬物莫不尊道而貴德道之尊德之貴夫莫之命而常自然萬物以能生故尊道以能畜故貴德莫之命猶之莫之為而為故道生之禀其精謂之生德畜之含其氣謂之畜長之遂其形謂之長育之字其材謂之育亭之權其成謂之亭毒之量其用謂之毒養之保其和謂之養覆之護其傷謂之覆以上七句極言道之曲成萬物之功有如此者生而不有為有不恃長而不宰是謂𤣥德然道雖生之而不自有其德雖為之而不自恃其能雖長之而任其自然未嘗宰制此其為德非人所能測之矣此章言道生萬物之事道者萬物之母物非道不生非德不畜自其有形以至于勢長莫不以道德為主道之尊德之貴至于此極矣然不自尊其尊自貴其貴其施于物非有心于物也莫之命而常自然自然而生自然而畜凡所以長有成熟以至于養之覆之莫非自然者然且生之而不自有為之而不自恃長之而未常宰制也不謂之𤣥德而何第五十二章天下有始以為天下母無名天地之始有名萬物之母道方無名則物之所資始也及其有名則物之所資生也既得其母以知其子既知其子復守其母歿身不殆母謂道也子謂萬物也塞其兑閉其門終身不勤開其兑濟其事終身不救心動于內而吾縱焉是謂有兑吾則塞其兑而不通物引于外而吾納焉是謂有門吾則閉其門而不納能此者終身不勞而成功若開兑以濟事則陷溺而不可救矣見小曰明守柔曰强不可目窺曰小不可力得曰柔用其光復歸其明無遺身殃是謂襲常光者明之用明者光之體用其光而復歸于明則返于寂然矣何殃之有襲常猶言前襲明謂密而不露也此章言道為天下母而聖人體之也夫無名天地之始有名萬物之母道常無名而為天下母何也蓋有名有萬物母而未足為天下母也無名天地之始則自天而下皆生于無名矣故曰天下有始以為天下母也聖人體道以用物既得其母以知其子了然無不察也雖智能用之而未以物忘道故終守其母也則天下孰能以我之所出而害其所自出哉此所以沒身不殆也守之如何亦曰塞其兑閉其門而已心動于內而吾縱焉是謂有兑有兑則心出而交物我則塞其兑而不通不通則不出矣物引于外而吾納焉是謂有門有門則物入而擾心我則閉其門而不納不納則物不入矣內不出外不入雖萬物之變藝藝于前而不知夫何勤之有哉若乃忘道狥物開其兑而不塞濟其事而不損則終身陷溺其莫之故也夫帷守其母者于不可目窺者獨能見之故曰見小曰明于不可力得者獨能守之故曰守柔曰强既用其光以照其微復歸其明以返于寂然也則未常開兑濟事以至于不救何殃之有哉如是知常之明明深不可見矣第五十三章使我介然有知行于大道惟施是畏體道者無知無行無所䚳施而物自化今介然有知而行于大道則有施設建立非其自然有足畏者矣大道甚夷而民好徑大道平易世之不知者以為迂逺而好徑以求捷朝甚除好土木也田甚蕪奪民時也倉甚虛廢本業也服文綵好淫巧也帶利劍好武勇也厭飲食好醉飽也資貨有餘好聚飲也是謂盜竽非道哉竽者五聲之長者也竽唱則諸樂皆和盜竽謂盜自此隨之矣見小曰明而知非明也君子之于道茍無知無為則雖萬變陳于前而不足以撓亂其心夫何畏哉使我介然以有知之心而行大道所知有限而道無窮怵怵然恐其施之不足而無非可畏之塗矣蓋大道甚平而民好徑好徑者知之為賊也是以除治其朝廷則外飾者至矣田蕪而倉虛則未作者興矣方且服文綵以眩人帶利劍以威衆積飲食資貨而無所用之是盜之竽也豈足為道也哉第五十四章善建者不拔善抱者不脫子孫祭祀不輟凡物以建而立者未有不拔唯為道者建之以常無有則善建而不拔矣凡物以抱而固者未有不脫唯為道者抱神以靜則善抱而不脫矣祭祀不輟言其傳不窮也修之于身其德乃真修之于家其德乃餘修之于鄉其德乃長修之于邦其德乃豐修之于天下其德乃普真謂實而不僞也餘謂積而有餘慶也長及人者逺也豐則及人愈盛矣普則及人愈遍矣故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下以身之道觀身以家之道觀家推之鄉邦天下皆然吾何以知天下之然哉以此以此者道也以道而觀則天下莫不然此章言修德之事世未有建而不拔抱而不脫者唯聖人和性之真審物之妄捐物而修身其德充積實無所立而其建有不可拔者實無所執而其抱有不可脫者此所以子孫世世傳之無窮也世之所謂修德者或修之于天下邦家而不知其本真乃在吾身也或修之于身而不能推之家邦天下不知必由家以及天下然後其德施乃普也然則聖人何以修之哉亦曰以身觀身而已何謂以身觀身觀吾身之所有何自也則知吾身之所自而已矣又觀吾身之所以觀者何自也則知吾觀之所自而觀矣推之以家觀家以鄉觀鄉以邦觀邦以天下觀天下蓋莫不然然則吾何以知天下之所以然哉亦以此道而已豈不以此道之體無所不包而此道之用無所不逹也歟第五十五章含德之厚比于赤子含德藏畜而不露也厚者至也含德而極其致則如赤子矣毒蟲不螫猛獸不據攫鳥不摶毒蟲蠆之類以尾端肆毒曰螫猛獸虎豹之類以瓜按拏曰據攫鳥鵰鶚之類以羽距擊觸曰摶骨弱筋柔而握固未知牝牡之合而䘒作精之至也以四指握拇指曰握固䘒赤子隂也握固䘒作皆精氣盛之故終日號而不嗄和之至也嗄聲嘶也不嗄者無喜怒氣本和也知和者常知此至和之理則可以常久而不易矣知常曰明知此常久之理可以明于道矣益生曰祥生不可益强求益之是傷生也故謂妖孽心使氣曰强以心使氣是動氣也故謂强暴物壯則老謂之不道不道早已强無有不折如物之壯無有不老此皆不謂之道早已速已之而勿為也夫君子修德則自能含德矣人之初生其德性至厚也其及長也耳目交于外心識受于內則其厚者薄矣為道者損之又損德至而同于初故曰含德之厚比于赤子夫赤子無心無心則物無與敵者是以毒蟲不螫猛獸不據攫鳥不摶而曷由傷之今夫赤子不知所取而握固未知牝牡之合而䘒作蓋精冇餘而非心也使赤子者介然有取與之知則不一而粗矣其能如是乎然無喜愠故終日號而不嗄蓋心不動而氣和也使赤子者有所喜愠則氣戾而不和其能如是乎故知至和之理者斯可謂之常矣知此常道者斯可謂之明矣知常則因其自然而不益生動不知所為行不知所之奚以心使氣為哉生不可益而欲益之則自遺其殃矣氣惡妄作而又心以使之則强梁甚矣夫致虛而守柔者道也道乃久歿身不殆今致實而强則物而已物壯則老其道也哉故常連已之而勿為也第五十六章知者不言言者不知謂道不可容言也塞其兑心不出也閉其門物不入也挫其鋭治其內也解其紛理其外也和其光抑其在已也同其塵隨其在物也是謂𤣥同無出無入無內無外無已無物此所謂至妙同然而然之理也不可得而親不可得而疏均覆萬物而熟為親疏不可得而利不可得而害等觀順逆而熟為利害不可得而貴不可得而賤不知榮辱而熟為貴賤故為天下貴此道之所以為天下貴也知至于知常則知之至也知之至則默而成之而無不理也何所容言哉茍為不能無言則是未常真知也塞兑閉門已見五十二章然彼則約道清靜以塞嗜欲愛悅之端此則宗道無言以合損聰棄明之理夫道無形不可以目視不可以口傳此至人心契道妙而自塞兑閉門也挫鋭解紛和光同塵已見第四章然彼則就道以施功此則據人以明行至人與天下同心而無知與道同身而無體則鋭進紛亂之心而何于有光塵分别之意于何而生哉是謂有無渾融同然而然之道也是以無所甚親無所甚疏故不可得而親疏不就利不害避故不可得而利害不榮貴通不醜窮故不可得而貴賤夫可得而親疏利害賤者則貴在于物而物能賤之不可而親疏利害之貴賤者貴在于我而物不能賤也其為天下貴不亦宜乎第五十七章以正治國以竒用兵聖人柔逺能邇無意于用兵唯不得已然後有征伐之事故治國必以正用兵方以竒以無取天下者廓然無事而天下自歸之吾何以知天下之然哉吾何以知無事之足以取天下哉下文因舉有事之害之明之天下多忌諱而民彌貪上多忌諱下情不上逹則民貧而無告矣民多利器國家滋昏利器權謀也聖人在上常使民無知無欲民多權謀則其上眩而昏矣人多技巧竒物滋起人不務本業而趨末技則非常之物無益作矣法令滋章盜賊多有患人之詐僞而多為法令以勝之民無所措手足則日入于盜賊矣故聖人云我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴此無事足以取天下之證此章言治國之事治國者不可以不常且久欲以正而不以竒正者立萬世之紀者也用兵者不得已之事故以竒而不為正竒者應一時之變者也夫不以智治國者國之福治國而無所事智則無事之足以取天下也明矣然則吾何以知無事之足以取天下哉正以有事不足以取天下而知之也夫唯為不出于無為而至于有事于是天下多忌諱以避其所惡則失業者衆而民彌貧人多利器以趨其所好則下難知而國家滋昏民彌貧則多為巧利國家滋昏則竒物競起此法令所由滋章也然法禁于法之所加而不能禁于法之所不加令行于令之所聼而不能行于令之所不聼此所以盜賊多有也若然者凡以事事取天下之過也故聖人云我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴此則取天下常以無事之證也由無為故好靜夫惟無為則民自化而棄技絶巧好靜則民自正而盜賊無有由無為好靜故無事而無欲以無事則民自富而無忌諱之貧以無欲則民自朴而無利器之昏其道然也第五十八章其政悶悶其民淳淳悶悶者不作聽明也淳淳者自樂也其政察察其民缺缺察察者煩辟也缺缺者不足也禍兮福所倚福兮禍所伏孰知其極其無正禍福無常誰知其所止極正定也言不可得而定也正復為竒善復為祅竒邪邪或為正正或為邪善或為祅祅或為善此亦禍福所伏之意人之迷也其日固久矣人迷而不知徒生分别非一日矣是以聖人方而不割割削也言雖方正而不刻削亷而不劌劌傷也言雖有廉隅而不傷物直而不肆肆伸也不伸不見其直也光而不耀耀光之熖者也不耀其光藏也以正治國以無事取天下則其政悶悶矣故其民淳淳不澆于薄也以智治國以有事為天下則其政察察矣故其民缺缺不全于朴也何則時有始終世有變化有所拂者有所宜有所拂者世所謂禍而有所宜則福所倚也有所宜者世所謂福而有所拂則禍所伏也若此者莫知紀極果孰得而定之耶且夫今為正者後或為邪此為邪者彼或為正善與祅亦然則天下之禍福正邪善邪果未可定也民自有知以來迷而執之其日久矣奈何重之以察察之政而使之不得返其朴乎是以聖人方而不割故不以一人斷制利天下亷而不劌故勝物而不傷直而不肆故能曲全而枉直光而不耀故用其光後歸于明此無他取此悶悶而去彼察察故也第五十九章治人事天莫若嗇外以治人內以事天皆莫如嗇嗇者謹于內間于外內心不馳外心不起之謂夫惟嗇是謂早服謂之重積德服者內服其心外服其形之早不逺也惟重積德言先以有所積復養以嗇是又加積之也重積德則無不克無不克則莫知其極無不克者物不能勝也莫知其極者用之不窮也莫知其極可以有國有國之母可以長久道者萬物之母故得道者可以有國而長久是謂深根固柢長生久視之道根柢元氣也根深而不可拔柢固而不可脫雖以長生久視可也此章言治人事天之事治人而不以人之所以為人者治之則人不可得而治矣事天而不以天之所以為天者事之則天不可得而事矣夫精神四逹并流而無所不極化育萬物其名為同帝則人之所以為人而天之所以為天者也純素之道惟神是守守而勿失與為一則人其有不可得而治天其有不可得而事者乎故曰莫如嗇也夫惟嗇其精神而不侈費則早服者也茍為不嗇而費之至于神敝精勞雖欲反其精神無由入矣不亦晚乎故曰夫唯嗇是謂早服人之生也固足于德夫誠能嗇而早服之則得日益以充故曰謂之重積德重積德則人莫之能病而物莫之能傷安往而不克哉夫有所不克則其道有時而極無不克則孰知其極乎于是則雖有國可也道者萬物之母既得其母以知其子既知其子得守其母歿身不殆故曰可以長久然則嗇之為道是謂深根固柢長生久視之道也精神者生之根嗇而藏之則根深而生長矣長生者視之柢衛而保之則柢固而視久矣第六十章治大國若烹小鮮烹小鮮者攬之則碎治大國者擾之則亂清靜無為安靜不擾此治國之道也以道蒞天下其鬼不神非其鬼不神其神不傷人聖人以無為天下雖有神姦無所用之非聖人絶之使不神雖神而自不能人之傷也非其神不傷人聖人亦不傷之由聖人不傷人故其神不傷人也夫兩不相傷故德交歸焉神鬼所以不相傷者由上有聖人也故德交歸于聖人焉得有國之母以治國雖大無觀也烹小鮮者不可以撓治大國者不可以煩煩則人勞撓則魚爛必然之理也聖人以道蒞天下無為無事使人外無所擾內無所畏則物莫能侵及其至也則其鬼不神何以言之之道非不神也而其所以不神者隂陽和靜六氣均調萬物咸若羣生不夭其神不傷人也然又非其神不傷人也所以不傷人者由聖人以道蒞天下使人不淫其性不遷其德無喜喜大怒以干隂陽之和則是聖人亦不傷人也使聖人至于人不能全其朴而傷之而人失其性至于四時不順寒暑之和不成人之所以傷人者為多則神其能不傷人乎夫惟大而政事幽而神兩不相傷故人見之心交歸焉非至德其能如是乎第六十一章大國者下流天下之歸大國猶衆水之趨下流天下之交交㑹也天下之牝大國以牝自居牝以靜勝牡牝動牡靜靜者受益故曰勝牝以靜為下動者居下靜者居下故以靜為下故大國而下小國則取小國下者自謙也取小國者小國附之也小國而下大國則取大國取大國者大國納之也故或下以取能下以取小國之附或下而取能下而取大國之容大國不過欲兼畜人畜者撫之也小國不過欲入事人事大國以自安夫兩者各得其所欲故大者宜為下此章指大國小國以喻知道之人宜謙宜靜也為大國者能自卑下則可以合天下之交其下也譬如牝然牝者以勝而勝其牡者也惟靜惟下而牝以勝如道者法之故以大國而下小國必得小國之附以小國而下大國必得大國之容則欲下以取或下而取各獲其心矣夫大國不過欲兼畜乎人小國不過欲入事乎人兩者各能自下斯各得其所欲然則知道之大者當以謙下為宜矣第六十二章道者萬物之奧室中之奧深而能藏善人之寶賢者以道為寶不善之人所保不賢者道能保之美言可以市市售也尊行可以加人行之尊者人推服之人之不善何棄之有有道者量若天地故不棄不善故立天子置三公雖有拱璧以先駟馬不如坐進此道拱璧重寶也駟馬良馬也雖進此不如進道之貴重也古之所以貴此道者何也不曰求以得即所謂善人之寶有罪以免耶即所謂不善人之所保故為天下貴此章言道之貴道為萬物之統如奧藏物故善人以道為寶不善人為道所保在道原無分善分不善之見也天下言之美者猶可以市行之尊者猶可加人有道者非特美言尊行之比則人之不道道自保之何棄之有哉夫立天子置三公將以道救人耳雖有拱璧之寶駟馬之良以進之不如進此道也彼古之所以貴此道者何哉以善人自得其善即不善之人亦觀感而自新以免于罪是故以為天下貴耳第六十三章為無為無為而後無不為事無事無事而後能集事味無味味所著于味然後知味大小多少統言事物之數報怨以德忘怨則見德而不見怨圖難于其易圖之于未難之先為大于其細為之未未大之際天下難事必作于易天下大事必作于細作起也是以聖人終不為大故能成其大為大于細故不為大而大者成夫輕諾必寡信出言輕則未必能應多易必多難見事易則未必能就是以聖人猶難之難之于未至之先故終無難終不見難矣此章言道在無為而非輕忽為心也為其所無為事其所無事味其所無味天下既清既靜無不正矣聖人至事物之來大小多少不可指數即以怨論之世人以怨相報聖人以德相容相容則相化夫何怨之可報哉推此而行又豈有投難遺大之足慮乎然天下非無難事非無大事也至于難而後圖至于大而後為則不可圖不可為也若圖難于易為大于細自無不濟矣惟知夫難必起于易大必起于細故聖人為大于其細不為大于其大此所謂終不為大乃能成其大耳夫輕諾者必過當而失信以易心處事者多至于難成聖人于事之未至則常若難之非難之也難之于其易不難之于其難也故終無難之者也第六十四章其安易持安之時易持危而持之則難矣其未兆易謀未兆無形也事未有形易謀及其形見則難謀矣其脆易判脆者未聖也判破也其微易散微者未著也為之於未有不以為為之天下終無事及其有事愈為愈有治之于未亂以無治治之天下自治及其既亂愈治之而愈亂合抱之木生于豪末合抱大木也豪末始生之時也以見大生于小九成之臺起于纍土纍土平地而積之也以見髙起于下千里之行始于足下足下方行之頃也以見逺起于近為者敗之有為之為欲成反敗執者失之執之愈固失之愈易是以聖人無為故無敗無執故無失民之從事常于幾成而敗之幾成將成也慎終如始則無敗事不求事之終而致慎于事之始是以聖欲不欲不貴難得之貨以不欲為欲故未常貴難得之貨學不學復衆人之所過以不學為學以救衆人逐末多事之過以恃萬物之自然而不敢為此章言道炳幾先之妙天下惟安易持未兆易謀脆易判微易散故為事當于未有之先治亂者當于末亂之日矣今夫合抱之木最大也而起于小九層之臺最髙也而起于下千里之行最逺也而起于近則知治亂禍福之來其幾皆然而非可有意于其間也世人不明乎此以為非為不成非執不固必至于敗失而後已聖人惟為以不為執以不執敗失何由而至乎夫民之從事常于將成而敗者由其有意于為之耳為以無為而致慎也則慎其終猶慎其始必無敗矣故聖人欲不欲學不學內外空明廓然無為惟恃萬物之自然以成其功此無他能燭其幾也第六十五章古之善為道者非以明民將以愚之使之無知則可無欲民之難治以其智多察察之智故以智治國國之賊為國之害不以智治國國之福知此兩者亦楷式楷模也式法也能知楷式是謂𤣥德𤣥德深矣逺矣𤣥德即𤣥同之德下徹曰深旁周曰逺與物反矣乃至大順反于物乃順于道此章言去智之治古之聖人以道治民非以明之將愚之耳何也聰明者道之纍也民之難治以其智多多智之勢必嗜欲雜而機詐作則亂之所由生故以智治國國之賊不以智治國國之福也能知智之為賊不智之為福則可以為法于天下知法之而不違其德𤣥矣尚可測其深量其逺乎夫物情莫不貴智而𤣥德獨賤之是與物也孰知其適以大順于道哉第六十六章江海所以為百谷王者以其善下之江海在百谷之下故能為百谷王王者言天下之所歸往也是以聖人欲上人以其言下之稱孤稱寡以言下之也欲先人以其身後之感而後動不得已而後起以身後之也是以處上而人不重物在上相壓則重聖人居上而人不以為重處前而人不害是以天下樂推而不厭推戴為主而無離心以其不爭故天下莫能與之爭此言聖人之能自下百谷之水皆歸之江海江海為百谷之尊而乃居百谷之下則能為天下主者亦下之而已故聖人欲上人以其言下之欲先人以其身後之聖人非欲上人先人也下之後之其道不得不上且先耳是以處上而人不重處前而人不能害夫如是故天下樂推之而不厭以其下人後人而不爭也夫唯不爭故天下莫能與之爭矣第六十七章天下皆謂我道大似不肖肖似也當時有此語也夫惟道故似不肖大則無所肖猶之天孰有物肖天者乎若肖久矣其細也夫此句正見人言之不足怪我有三寶寶而持之一曰慈慈愛物者也二曰儉儉者節省也三曰不敢為天下先不與物爭也夫慈故能勇慈則柔柔能勝剛故勇儉故能廣儉則不費不費則常足故廣不敢為天下先故能成器長器形也長君長也凡成形者我皆謂之長故曰成器長今舍其慈且勇舍其儉且廣舍其後且先死矣舍此三寶必至死亡夫慈以戰則勝以守則固天將救之以慈衛之此章暢言道之濟世也天下之人見我道大而謂其似不肖夫道何所肖乎道外物物故無所肖若有所肖則道外有物矣尚得為大乎故道唯大乃似不肖若肖也久矣其細也矣夫道所以如此之大者以我有三寶寶而持之耳一曰慈二曰儉三曰不敢為天下先此三者皆世人之所不貴也彼所貴者勇敢耳廣大耳鋭進耳而孰知慈故能勇儉故能廣不敢為天下先故能成器長也今使舍其慈儉後而為其勇廣先則必為人所疾為人所疾死之徒矣夫慈之為道物愛之如父母雖為之效死而不辭故以戰則勝以守則固天之將救是人也則使之無所不慈無所不慈則物皆為之衛矣第六十八章善為士者不武士戰士也不武行之以怯也善戰者不怒怒乃忿兵善勝敵者不爭不與之爭先善用人者為之下下者物所歸是謂不爭之德是謂用人之力不强人而人自從之故能用其力是謂配天古之極自古以來無加于此故曰古之極此章借喻不爭之德天下至爭者惟兵故戰士當以武為賢然以武行武則强梁者不得其死矣故善為士者不武不得已而用兵以理勝之忿則敗矣故善戰者不怒以吾不爭方能勝彼之爭若皆出于爭不能勝矣故善勝敵者不爭人皆有相上之心則不相為用誠能下之則皆我所用矣故善用人者為之下四者皆不爭之喻也不爭之德可以屈羣力用天下故可以與天相配而自古無加之者矣第六十九章用兵有言古兵家有此言吾不敢為主而為客主造事者也客應敵者也不敢進寸而退尺進者有爭心退者無爭意是謂行無行上行字如字下行字言行列也攘無臂攘揎也扔無敵扔引也執無兵兵刃也禍莫大于輕敵輕敵幾喪吾寶不爭而勝是吾寶也故抗兵相加哀者勝矣抗舉也哀者若哀戚而不以用兵為喜此章全是借戰事以喻道用兵者不敢為主而為客不敢輕進而寧易于退如此則無爭心矣茍無爭心則行于陳之行中若無行陳攘臂而無臂可攘引敵而無敵可引執兵而無兵可執行其無事而兵自勝若輕敵而自矜必至于喪敗以失不爭之寶禍莫焉焉矣故舉兵相加則有哀矜之心者勝矣第七十章吾言甚易知甚易行天下莫能知莫能行嘆世之不能入道言有宗宗者族之總事有君君者民之總夫唯無知是以不我知也知我者希則我貴矣知者希而我貴即不笑不足為道之意是以聖人褐懷玉褐懷玉者外與人同而中獨異也此章言知道者少而示以道之主宰謂吾道在日月飲食之間甚易知甚易行而世人莫能知莫能行也豈不易哉夫即言是道而言之中有宗焉即事是道而事之中有君焉世人求道于言求道于事而未得其宗君是循其未也故不能有知而因以不我知然道在目前而不可以意識知之道之所以貴耳則知我者希正我之貴也夫聖人之同于人者猶被褐然其外相同而懷中有玉則其足于已不形于外者是乃所以異于人而人亦莫之見也已第七十一章知不知上知道而不以為知是為最上不知知病病猶害也不知而强為知是為害道夫唯病病是以不病知此病之為病則可以不入于病聖人之不病也以其病病是以不病病此病之為病唯聖人耳上言道易知而知道者少夫知固難言之矣于其至知而若不知此道之上也于不可知之中而自以為知此學道之病也人能病其知之為病則無病矣聖人之所以不病者正以知其為病而以病防之所以不病第七十二章民不畏威威可畏也則大威至矣大威大可畏也無狹其所居無者戒之之辭言不可如此也居廣居也無厭其所生厭塞絶之也生者長生久視之理也夫惟不厭是以不厭能不自厭其生又何厭之有是以聖人自知不自見含德藏明自知也而不表表自見于外言其能晦也自愛不自貴體道絶私自愛也而不切切貪生以自矜言其能虛也故去彼取此此章因民情之偏而引之于道凡民之動而之死者以其不知畏耳今觀凡兵凡刑凡祍席之上凡飲食之間一切損壽戕生之事皆大可畏者也茍不知畏則禍亂灾害之所由起故大威至此必然之理也正以民欲難靖不安于退而務進則求居之廣而反狹今不可自狹其所居也不觀于無而惑于有則求生之久而反厭今不可自厭其所生也茍能不厭則與生俱忘無所慕亦無所苦而生自不厭矣不見聖人乎反照知道而若不自見致虛自愛而必不自矜惟其無狹厭之端而居自廣生自久耳故曰去彼取此第七十三章勇於敢則殺勇于敢剛也勇於不敢則活勇于不敢柔也此兩者或利或害活為利殺為害天之所惡勇敢者天惡之孰知其故世人不知是以聖人猶難之聖人知之故難于勇敢天之道不爭而善勝天自運行不與物爭先而物莫先之不言而善應天何言哉行生自應不召而自來隂盡陽生暑退寒至皆不召也繟然而善謀繟紓緩也天網恢恢恢恢廣大也疏而不失雖若疏而實密此章以天道曉人也用其剛强則勇于敢此死之徒也致其柔弱則勇于不敢此生之徒也敢者之害不敢者之利二者甚明惟天好生于勇于敢者以其近殺而惡之矣世人不能知而聖人獨知之所以難之而不敢剛也聖人者以天道為道天之于物也裁培傾覆任其自然未嘗與物爭而物莫能違故曰不爭而善勝時行物生非有所命之也而行生不悖故曰不言而自應莫之為而為莫之致而至故曰不召而自來盈虛消息與時遞進舒徐而無所營也故其謀度非人之所及故曰繟然而善謀蓋天道恢恢譬如網然世人見其一目或以為疏不知舉其全而言之則福善禍淫無有漏失者已然則天之所惡可不戒歟第七十四章民常不畏死奈何以死懼之匹夫而有捐軀之時不畏死也若使民常畏死而為竒者民皆知法而獨有竒邪者出于其間吾得執而殺之孰敢孰敢者謂殺之而不敢不服也常有司殺者殺司殺者天也而代司殺者殺不當殺而殺則為代司殺者殺之矣是代大匠斫譬之代大匠斫木夫代大匠斫希有不傷其手矣此章言刑以坊民當去其泰甚也凡用刑者不過以死懼民而民常有不畏死者矣奈何以使懼之乎若使民安于大道之中樂生畏死然後執其竒邪者而殺之孰敢不服則自人自取殺殺之者司殺之天而非我也若不當殺而欲代司殺者殺是猶代大匠斫木矣妄用斧斤豈有不傷其手者乎第七十五章民之饑以其上食稅之多也是以饑取民太重則民貧民之難治以其上之有為也是以難治有為過用智術也過用智術則巧于相避民之輕死以其生生之厚也是以輕死過于自奉是厚也輕用其身以取死亡是輕死也夫惟無生為者是賢于貴生無以生為即忘其身而身存也貴生者是矜其生者也此章論生死之道由粗及精而歸于忘身也上多取則下饑上多事則下亂此必然之勢也至民之過于自愛方以為養生之厚而不知適輕其身輕身則輕死矣聖人唯無以生為則所謂及吾無身吾有何患也豈不賢于自貴其生者乎第七十六章人之生也柔弱嬰孩之質柔弱其死也堅强老大之質堅强草木之生也柔脆草木之萌必柔脆其死也枯槁長大則枯槁槁上聲堅强者死之徒徒類也柔弱者生之徒是以兵强則不勝强則自特木强則共言人共伐之也强大處下物之粗者必强大粗者人必下之柔弱處上物之精者必柔弱精者人必上之老子之學主于尚柔故此章以人與草木之生死為喻言人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁則凡有形者必以堅强而死柔弱而生一定之理也故用兵者恃强而驕必以取敗而木之强也人伐之可見堅强之質粗而柔弱之用精也故知道者以强大為下柔弱為上第七十七章天之道其猶張弓乎髙者抑之下者舉之凡張弓者欲勻不欲偏故有髙處則抑之有下處則舉之有餘者損之不足者𥙷之上二句言張弓此二句言天道天之道損有餘而𥙷不足人之道則不然損不足而奉有餘損不足之民奉有餘之君孰能以有餘奉天下惟有道者有道者法天道以為人道是以聖人為而不恃成功而不居其不欲見賢耶不欲見賢于人此章言損上益下之道天道惡淫而好謙譬之張弓髙者抑之下者舉之故天道損有餘以𥙷不足使之均平而已天道如此何至于人則不然而獨損不足以奉有餘也惟有道之人乃能損我之有餘以奉天下故有為與成功皆我之所餘而天下之所不足為之而不恃成功而不居天下享其賜而不知所以奉之者不已至乎而聖人仍不自見其賢凡以法天之道而已第七十八章天下莫柔弱于水而攻堅强者莫之能先以其無以易之也無以易之謂雖曲折萬變而無易水之柔也故柔之勝剛弱之勝强天下莫不知莫能行人非不知而不肯行是以聖人云受國之垢是謂社稷主垢汚穢也以比凶惡受之者納之于柔道之中受國之不祥是謂天下王不祥妖孽也正言若反似反一世之常言其實正論此亦言尚柔之用水為至柔而穿突陵谷無堅不攻天下之物莫能先之惟無以易其柔也故柔之勝剛弱之勝强如水之易見人莫不知而能柔能弱者之少則莫能行也故聖人有言曰受國之垢是謂社稷主受國之不祥是為天下王蓋一國之內不能不善惡並出天下之大不能無妖孽雜生王者以柔道受之自然消歸于盡猶之川澤之納汚耳夫垢與不祥世人之所惡也而謂王者受之此正言若反之妙也知道者其可忽諸第七十九章和大怨必有餘怨怨者人之私隙和者强相和也安可以為善和怨非善道是以聖人執左契而不責于人契者刻木為劵中分之各執其一以表財物之信也契有左右左契在主財物之家待其右契而應之責者取之于人者也故有德司契司契者無心無德司徹徹强通之也天道無親常與善人至虛惟天豈有所愛而親之惟善人則與之耳此言大道之無心也恩怨兩忘方知至道人有大怨于我而必欲與之和雖無執怨之心猶知怨之為怨則餘怨尚在安得謂之善道聖人為而不恃功成不居每以有餘奉天下如執左契以待人之自取此所以無怨而不責于人也故司契者自合其合吾無容心是為無德若必欲强通之則無德之司徹非有德之司契矣天道亦然天道無親與常善人亦惟司契而已第八十章小國寡民國小民寡則俗自淳厚使有什伯人之器而不用器材器也其人之材堪為什夫伯夫之長者使民重死而不逺徙重死則畏罪不逺徙則安居雖有舟車無所乘之不致逺以求利雖有甲兵無所陳之不恃力以求勝使民結繩而用之結繩者上古之治也甘其食美其服安其居樂其俗鄰國相望雞犬之音相聞相望相聞言其近也民至老死而不相往來至老死言其久也此章蓋老子歎文勝之弊而欲以大古之治救之也謂有道者得小國寡民而治之使之有才而不用重死而不逺遷舟車甲兵置而棄之雖有書契亦無所施結繩足矣以食所之食為甘以所服之服為美以所居之居為安充然自足樂其俗而不知其他即以鄰國之相望雞犬之相聞其近如此而老死不相往來蓋各足而不相求也如是則淳淳悶悶所謂安平泰者非乎此老子因人心不古而思還醇反朴之俗欲復見之故有味乎言之也第八十一章信言不美美言不信信言真實之言美言華采之言善言不辨辨言不善善言純一之言辨言馳騁之言知者不博博者不知知知道也博博物也聖人不積虛若谷也既以為人已愈有施其所能以為人既以與人已愈多推其所有以與人天之道利而不害有心利物則害與利俱天行無心但見其利聖人之道為而不爭有為之心則起爭端無為之為爭于何有老子一書大抵以不爭為主故于終篇以真實喻人而歸于不爭之㫖也信則可復不必夸美故信言不美美言則文飾太過而不能信矣善則合理不必騁辨故善言不辨辨言則抑揚太過而不能善矣知常則一不必博通故知者不博博者則馳騖于外未必知道矣聖人之道絶聖棄智洞然四虛是無積也而以至無供萬物之求則為人而愈有與人而愈多此虛不屈動愈出之妙也蓋聖人與天同功天之道雖有美利而不言故但見其有利而無害聖人之道為而無不為而未嘗自恃其有故不與物爭而天下莫能與爭此聖人道與天合而不爭之所以為寶歟御定道德經注下篇
